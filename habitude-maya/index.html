<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>habitude · Nutrition Coaching with Maya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #0C0B09; color: #EDE8DE; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }
    #app { height: 100vh; display: flex; flex-direction: column; background: #0C0B09; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }

    /* ── WELCOME ── */
    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 2rem; text-align: center; }
    .w-logo { font-family: 'Cormorant Garamond', Georgia, serif; font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 400; letter-spacing: 0.08em; color: #EDE8DE; animation: fadeUp 0.7s ease forwards; }
    .w-tag { font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase; color: #C9963C; margin-top: 0.2rem; margin-bottom: 3rem; animation: fadeUp 0.7s 0.15s ease forwards; opacity: 0; }
    .w-card { background: #1A1714; border: 1px solid #2A2620; border-left: 3px solid #C9963C; padding: 1.4rem 1.5rem; max-width: 380px; text-align: left; margin-bottom: 2.25rem; animation: fadeUp 0.7s 0.3s ease forwards; opacity: 0; }
    .w-card h2 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.15rem; font-weight: 500; color: #EDE8DE; margin-bottom: 0.55rem; }
    .w-card p { color: #8A8278; font-size: 0.84rem; line-height: 1.75; }
    .start-btn { background: #C9963C; color: #0C0B09; border: none; padding: 0.9rem 2.5rem; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.2s, transform 0.15s; animation: fadeUp 0.7s 0.45s ease forwards; opacity: 0; }
    .start-btn:hover { background: #D4A843; transform: translateY(-1px); }
    .w-footer { margin-top: 2.5rem; font-size: 0.67rem; color: #2A2520; letter-spacing: 0.05em; animation: fadeUp 0.7s 0.6s ease forwards; opacity: 0; }

    /* ── ONBOARDING ── */
    .onboarding { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 2rem; overflow-y: auto; }
    .ob-inner { width: 100%; max-width: 440px; }
    .ob-logo { text-align: center; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.5rem; color: #EDE8DE; letter-spacing: 0.1em; margin-bottom: 1.5rem; }
    .ob-progress { height: 2px; background: #1A1714; margin-bottom: 2rem; }
    .ob-bar { height: 100%; background: #C9963C; transition: width 0.4s ease; }
    .ob-title { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.5rem; color: #EDE8DE; margin-bottom: 0.35rem; }
    .ob-sub { color: #6A6158; font-size: 0.82rem; line-height: 1.65; margin-bottom: 1.6rem; }
    .ob-field { margin-bottom: 1.1rem; }
    .ob-label { display: block; font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: #C9963C; margin-bottom: 0.4rem; }
    .ob-input { background: #1A1714; border: 1px solid #2A2620; color: #EDE8DE; padding: 0.78rem 0.9rem; font-size: 0.88rem; width: 100%; outline: none; font-family: 'DM Sans', sans-serif; -webkit-appearance: none; appearance: none; transition: border-color 0.2s; }
    .ob-input:focus { border-color: #C9963C; }
    .ob-input::placeholder { color: #3A3530; }
    .ob-input option { background: #1A1714; }
    .weight-row { display: flex; gap: 0.4rem; }
    .weight-row .ob-input { flex: 1; }
    .unit-btn { background: #1A1714; border: 1px solid #2A2620; color: #5A5450; padding: 0.78rem 1rem; font-size: 0.82rem; cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap; transition: all 0.15s; }
    .unit-btn.active { background: #C9963C; color: #0C0B09; border-color: #C9963C; }
    .ob-next { width: 100%; padding: 0.88rem; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; border: none; cursor: pointer; margin-top: 0.4rem; transition: background 0.2s; }
    .ob-next.on { background: #C9963C; color: #0C0B09; }
    .ob-next.off { background: #2A2620; color: #4A4540; cursor: not-allowed; }
    .ob-back { background: none; border: none; color: #4A4540; font-size: 0.82rem; cursor: pointer; padding: 0.45rem 0; margin-top: 0.3rem; font-family: 'DM Sans', sans-serif; width: 100%; text-align: center; transition: color 0.2s; }
    .ob-back:hover { color: #8A8278; }

    /* ── CHAT ── */
    .chat-header { display: flex; align-items: center; justify-content: space-between; background: #0F0E0C; border-bottom: 1px solid #1E1C18; padding: 0.8rem 1.25rem; flex-shrink: 0; }
    .maya-info { display: flex; align-items: center; gap: 0.65rem; }
    .avatar { width: 34px; height: 34px; background: linear-gradient(135deg, #C9963C, #8B6020); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 0.9rem; color: #0C0B09; flex-shrink: 0; }
    .avatar.sm { width: 28px; height: 28px; font-size: 0.78rem; margin-top: 2px; }
    .maya-name { font-size: 0.88rem; color: #EDE8DE; font-weight: 500; }
    .maya-role { font-size: 0.66rem; color: #C9963C; letter-spacing: 0.1em; text-transform: uppercase; }
    .h-logo { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.1rem; color: #3A3530; letter-spacing: 0.06em; }
    .messages { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #2A2620; border-radius: 2px; }
    .msg-maya { display: flex; gap: 0.55rem; max-width: 88%; align-self: flex-start; animation: fadeUp 0.3s ease; }
    .msg-user { display: flex; flex-direction: row-reverse; gap: 0.55rem; max-width: 78%; align-self: flex-end; animation: fadeUp 0.3s ease; }
    .bubble-maya { background: #161410; border: 1px solid #2A2620; padding: 0.8rem 1.05rem; font-size: 0.87rem; color: #B0A89E; line-height: 1.72; }
    .bubble-maya strong { color: #EDE8DE; font-weight: 500; }
    .bubble-maya em { font-style: italic; color: #C8A96E; }
    .bubble-maya h2, .bubble-maya h3, .bubble-maya h4 { color: #EDE8DE; font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 500; margin: 0.7rem 0 0.35rem; font-size: 1.05rem; }
    .bubble-maya p { margin: 0 0 0.45rem; }
    .bubble-maya p:last-child { margin: 0; }
    .bubble-maya ul { padding-left: 1.2rem; margin: 0.35rem 0; }
    .bubble-maya li { margin-bottom: 0.2rem; color: #A09890; }
    .bubble-maya .tw { overflow-x: auto; margin: 0.65rem 0; }
    .bubble-maya table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .bubble-maya th { background: #222018; color: #C9963C; padding: 0.42rem 0.65rem; text-align: left; font-weight: 500; font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .bubble-maya td { padding: 0.38rem 0.65rem; border-bottom: 1px solid #1E1C18; color: #A09890; }
    .bubble-user { background: #C9963C; padding: 0.7rem 0.95rem; font-size: 0.87rem; color: #0C0B09; line-height: 1.6; }
    .msg-img { max-width: 160px; max-height: 160px; object-fit: cover; display: block; margin-bottom: 0.35rem; border: 1px solid #2A2620; }
    .dots { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
    .dot { width: 5px; height: 5px; background: #C9963C; border-radius: 50%; animation: pulse 1.2s ease infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    .input-area { background: #0F0E0C; border-top: 1px solid #1E1C18; padding: 0.85rem 1.25rem; flex-shrink: 0; }
    .preview-bar { background: #161410; border: 1px solid #2A2620; border-bottom: none; padding: 0.55rem 0.85rem; display: flex; align-items: center; gap: 0.55rem; }
    .preview-bar img { width: 32px; height: 32px; object-fit: cover; }
    .preview-bar span { color: #8A8278; font-size: 0.78rem; flex: 1; }
    .preview-bar button { background: none; border: none; color: #5A5450; cursor: pointer; font-size: 1.1rem; line-height: 1; padding: 0; }
    .input-row { display: flex; gap: 0.55rem; align-items: flex-end; }
    .photo-btn { background: #161410; border: 1px solid #2A2620; color: #6A6158; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 16px; transition: all 0.15s; }
    .photo-btn:hover { border-color: #C9963C; color: #C9963C; }
    .chat-ta { flex: 1; background: #161410; border: 1px solid #2A2620; color: #EDE8DE; padding: 0.72rem 0.9rem; font-size: 0.87rem; font-family: 'DM Sans', sans-serif; outline: none; resize: none; line-height: 1.5; max-height: 100px; transition: border-color 0.2s; }
    .chat-ta:focus { border-color: #C9963C; }
    .chat-ta::placeholder { color: #3A3530; }
    .send-btn { width: 42px; height: 42px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
    .send-btn.on { background: #C9963C; color: #0C0B09; cursor: pointer; }
    .send-btn.off { background: #2A2620; color: #4A4540; cursor: not-allowed; }
    .input-foot { font-size: 0.67rem; color: #1E1C18; text-align: center; margin-top: 0.4rem; }
  </style>
</head>
<body>
<div id="app"></div>
<input type="file" id="file-input" accept="image/*" style="display:none">

<script>
const MAYA_SYSTEM = `You are Maya, a warm and expert nutrition coach for habitude — a fitness and personal development coaching brand founded by Joel.

PERSONALITY: Warm, encouraging, never judgmental. Clear and practical — give real numbers and actionable advice. Ask questions to understand the 'why' behind habits. Celebrate small wins genuinely. Sound human, not robotic.

ONBOARDING: When you receive a client profile, create a personalised Nutritional Programme:
1. Calculate estimated daily calorie needs using the Mifflin-St Jeor equation
2. Set macro targets: protein (g), carbohydrates (g), fats (g) — briefly explain the rationale
3. Show a sample day of eating that hits those macros with real food examples
4. Give 3 key habits to focus on this week
End with a warm, encouraging message. Use **bold** for key numbers and headings.

WEEKLY CHECK-IN (first message of a new week, ask before setting goals):
1. Energy levels this week (1–10)?
2. Training performance (1–10)?
3. How well did you hit your macro targets (1–10)?
4. Any notable challenges or wins?
5. Changes in schedule, stress, or sleep?
Then re-estimate and negotiate macro goals for the coming week.

DAILY FOOD PHOTO LOGGING: When a client shares food photos:
- Identify the foods and estimate portions
- Estimate: Calories, Protein (g), Carbs (g), Fats (g)
- Comment on meal quality (fibre, micronutrients, satiety)
- Compare to daily targets if known

END OF DAY SUMMARY (when client says it's end of day):
Present a table: | Meal | Calories | Protein | Carbs | Fat |
Then totals vs targets. Ask about: energy today, sleep last night, training performance.

WEEKLY REVIEW: Share weekly macro totals. Highlight patterns helping progress (praise). Address patterns hindering progress (kindly, ask why). Ask deeper questions about habits.

MEAL SUGGESTIONS: When asked, suggest practical, delicious meals based on ingredients and preferences.

BUSINESS (mention naturally, never pushy):
- Monthly human review available for £50 — Joel personally reviews patterns and provides deeper behavioural insights
- Clients who refer a friend who signs up get 10% off their next human review

Always represent habitude with warmth and professionalism.`;

const GOALS = [
  { v: "lose_fat", l: "Lose body fat" },
  { v: "build_muscle", l: "Build muscle / gain weight" },
  { v: "recomposition", l: "Body recomposition" },
  { v: "maintain", l: "Maintain current weight" },
  { v: "performance", l: "Improve athletic performance" },
];
const ACTIVITY = [
  { v: "sedentary", l: "Sedentary (desk job, little exercise)" },
  { v: "light", l: "Light (1–3 days/week)" },
  { v: "moderate", l: "Moderate (3–5 days/week)" },
  { v: "active", l: "Active (6–7 days/week)" },
  { v: "very_active", l: "Very active (physical job + training)" },
];

function mdToHtml(t) {
  if (!t) return "";
  let h = t;
  h = h.replace(/(\|[^\n]+\|\n?)+/g, tbl => {
    const rows = tbl.trim().split("\n");
    if (rows.length < 2) return tbl;
    const hdr = rows[0].split("|").filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join("");
    const bdy = rows.slice(2).map(r => {
      const cells = r.split("|").filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join("");
      return `<tr>${cells}</tr>`;
    }).join("");
    return `<div class="tw"><table><thead><tr>${hdr}</tr></thead><tbody>${bdy}</tbody></table></div>`;
  });
  h = h.replace(/^### (.+)$/gm, "<h4>$1</h4>");
  h = h.replace(/^## (.+)$/gm, "<h3>$1</h3>");
  h = h.replace(/^# (.+)$/gm, "<h2>$1</h2>");
  h = h.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  h = h.replace(/\*(.+?)\*/g, "<em>$1</em>");
  h = h.replace(/^[\-\*] (.+)$/gm, "<li>$1</li>");
  h = h.replace(/^(\d+)\. (.+)$/gm, "<li>$2</li>");
  h = h.replace(/(<li>.*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  h = h.replace(/\n\n/g, "</p><p>");
  h = h.replace(/\n/g, "<br/>");
  h = "<p>" + h + "</p>";
  ["h2","h3","h4","ul","div"].forEach(tag => {
    h = h.replace(new RegExp(`<p>(<${tag}[ >])`, "g"), "$1");
    h = h.replace(new RegExp(`(</${tag}>)<\\/p>`, "g"), "$1");
  });
  h = h.replace(/<p><\/p>/g, "");
  return h;
}

const S = {
  screen: "welcome",
  messages: [],
  input: "",
  loading: false,
  pendingImage: null,
  step: 0,
  form: { name:"", age:"", sex:"", weight:"", weightUnit:"kg", height:"", goal:"", activityLevel:"", trainingType:"", restrictions:"" },
};

const app = document.getElementById("app");
const fileInput = document.getElementById("file-input");

fileInput.onchange = e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => { S.pendingImage = { data: reader.result.split(",")[1], preview: reader.result }; render(); };
  reader.readAsDataURL(file);
  e.target.value = "";
};

async function callMaya(userMsg, history) {
  S.loading = true; render();
  try {
    const apiMsgs = [...history, userMsg].map(({ role, content }) => ({ role, content }));
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ system: MAYA_SYSTEM, messages: apiMsgs }),
    });
    const data = await res.json();
    const reply = data.content?.find(b => b.type === "text")?.text || "I'm here for you!";
    S.messages = [...history, userMsg, { role: "assistant", content: reply }];
  } catch (e) {
    console.error(e);
    S.messages = [...history, userMsg, { role: "assistant", content: "Something went wrong — please try again." }];
  }
  S.loading = false; render();
  document.getElementById("msgs-end")?.scrollIntoView({ behavior: "smooth" });
}

function doSend() {
  if (S.loading || (!S.input.trim() && !S.pendingImage)) return;
  const userMsg = S.pendingImage
    ? { role: "user", content: [{ type: "image", source: { type: "base64", media_type: "image/jpeg", data: S.pendingImage.data } }, { type: "text", text: S.input || "Here's what I had." }], _preview: S.pendingImage.preview }
    : { role: "user", content: S.input };
  S.input = ""; S.pendingImage = null;
  callMaya(userMsg, S.messages);
}

function handleOnboarding() {
  const f = S.form;
  const txt = `Hi Maya! Here is my profile:\nName: ${f.name}\nAge: ${f.age}\nSex: ${f.sex}\nCurrent weight: ${f.weight} ${f.weightUnit}\nHeight: ${f.height ? f.height + " cm" : "not provided"}\nMain goal: ${f.goal}\nActivity level: ${f.activityLevel}\nTraining type: ${f.trainingType}\nDietary restrictions/preferences: ${f.restrictions || "None"}\n\nPlease create my personalised nutritional programme!`;
  S.screen = "chat"; S.messages = []; S.step = 0;
  callMaya({ role: "user", content: txt }, []);
}

function render() {
  if (S.screen === "welcome") {
    app.innerHTML = `
      <div class="welcome">
        <div class="w-logo">habitude</div>
        <div class="w-tag">nutrition coaching</div>
        <div class="w-card">
          <h2>Meet Maya</h2>
          <p>Your personal nutrition coach. She'll create your programme, analyse your food photos, and help you build habits that actually stick — through daily check-ins and weekly reviews.</p>
        </div>
        <button class="start-btn" id="start-btn">Begin your journey</button>
        <div class="w-footer">A habitude product &middot; coaching by Joel</div>
      </div>`;
    document.getElementById("start-btn").onclick = () => { S.screen = "onboarding"; render(); };

  } else if (S.screen === "onboarding") {
    const f = S.form; const step = S.step;
    const valid = [f.name?.trim() && f.age && f.sex, f.weight && f.goal, f.activityLevel && f.trainingType?.trim()][step];
    let fields = "";
    if (step === 0) {
      fields = `
        <div class="ob-title">Let's get to know you</div>
        <div class="ob-sub">Maya will use this to personalise your programme.</div>
        <div class="ob-field"><label class="ob-label">Your name</label><input class="ob-input" id="f-name" placeholder="e.g. Sarah" value="${f.name}"></div>
        <div class="ob-field"><label class="ob-label">Age</label><input class="ob-input" id="f-age" type="number" placeholder="e.g. 32" value="${f.age}"></div>
        <div class="ob-field"><label class="ob-label">Sex (for calorie calculations)</label>
          <select class="ob-input" id="f-sex"><option value="">Select...</option><option value="female" ${f.sex==="female"?"selected":""}>Female</option><option value="male" ${f.sex==="male"?"selected":""}>Male</option></select></div>`;
    } else if (step === 1) {
      fields = `
        <div class="ob-title">Your body &amp; goals</div>
        <div class="ob-sub">Honest numbers help Maya give you accurate targets.</div>
        <div class="ob-field"><label class="ob-label">Current weight</label>
          <div class="weight-row">
            <input class="ob-input" id="f-weight" type="number" placeholder="e.g. 65" value="${f.weight}">
            <button class="unit-btn ${f.weightUnit==='kg'?'active':''}" id="btn-kg">kg</button>
            <button class="unit-btn ${f.weightUnit==='lbs'?'active':''}" id="btn-lbs">lbs</button>
          </div></div>
        <div class="ob-field"><label class="ob-label">Height (cm)</label><input class="ob-input" id="f-height" type="number" placeholder="e.g. 165" value="${f.height}"></div>
        <div class="ob-field"><label class="ob-label">Your main goal</label>
          <select class="ob-input" id="f-goal"><option value="">Select...</option>${GOALS.map(g=>`<option value="${g.v}" ${f.goal===g.v?"selected":""}>${g.l}</option>`).join("")}</select></div>`;
    } else {
      fields = `
        <div class="ob-title">Lifestyle &amp; training</div>
        <div class="ob-sub">Almost there. Helps Maya calculate your calorie needs accurately.</div>
        <div class="ob-field"><label class="ob-label">Activity level</label>
          <select class="ob-input" id="f-activity"><option value="">Select...</option>${ACTIVITY.map(a=>`<option value="${a.v}" ${f.activityLevel===a.v?"selected":""}>${a.l}</option>`).join("")}</select></div>
        <div class="ob-field"><label class="ob-label">Type of training</label><input class="ob-input" id="f-training" placeholder="e.g. powerlifting, yoga, running..." value="${f.trainingType}"></div>
        <div class="ob-field"><label class="ob-label">Dietary restrictions / preferences (optional)</label><input class="ob-input" id="f-rest" placeholder="e.g. vegetarian, no dairy, love pasta..." value="${f.restrictions}"></div>`;
    }
    app.innerHTML = `
      <div class="onboarding">
        <div class="ob-inner">
          <div class="ob-logo">habitude</div>
          <div class="ob-progress"><div class="ob-bar" style="width:${((step+1)/3)*100}%"></div></div>
          ${fields}
          <button class="ob-next ${valid?'on':'off'}" id="ob-next">${step < 2 ? "Continue →" : "Meet Maya →"}</button>
          ${step > 0 ? `<button class="ob-back" id="ob-back">← Back</button>` : ""}
        </div>
      </div>`;

    const collect = () => {
      if (step===0) { S.form.name=document.getElementById("f-name")?.value||""; S.form.age=document.getElementById("f-age")?.value||""; S.form.sex=document.getElementById("f-sex")?.value||""; }
      else if (step===1) { S.form.weight=document.getElementById("f-weight")?.value||""; S.form.height=document.getElementById("f-height")?.value||""; S.form.goal=document.getElementById("f-goal")?.value||""; }
      else { S.form.activityLevel=document.getElementById("f-activity")?.value||""; S.form.trainingType=document.getElementById("f-training")?.value||""; S.form.restrictions=document.getElementById("f-rest")?.value||""; }
    };
    document.getElementById("ob-next").onclick = () => { collect(); if (!valid) return; if (step < 2) { S.step++; render(); } else { handleOnboarding(); } };
    document.getElementById("ob-back")?.addEventListener("click", () => { S.step--; render(); });
    document.getElementById("btn-kg")?.addEventListener("click", () => { S.form.weightUnit="kg"; render(); });
    document.getElementById("btn-lbs")?.addEventListener("click", () => { S.form.weightUnit="lbs"; render(); });

  } else {
    const canSend = !S.loading && (S.input.trim() || S.pendingImage);
    const msgsHtml = S.messages.map(m => {
      const isMaya = m.role === "assistant";
      const text = typeof m.content === "string" ? m.content : (m.content.find?.(b => b.type === "text")?.text || "");
      const preview = m._preview || null;
      if (isMaya) {
        return `<div class="msg-maya"><div class="avatar sm">M</div><div class="bubble-maya">${mdToHtml(text)}</div></div>`;
      } else {
        return `<div class="msg-user"><div>${preview ? `<img class="msg-img" src="${preview}">` : ""}${text ? `<div class="bubble-user">${text}</div>` : ""}</div></div>`;
      }
    }).join("");
    const loadingHtml = S.loading ? `<div class="msg-maya"><div class="avatar sm">M</div><div class="bubble-maya"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>` : "";
    const previewHtml = S.pendingImage ? `<div class="preview-bar"><img src="${S.pendingImage.preview}"><span>Photo ready to send</span><button id="clear-img">&times;</button></div>` : "";

    app.innerHTML = `
      <div class="chat-header">
        <div class="maya-info">
          <div class="avatar">M</div>
          <div><div class="maya-name">Maya</div><div class="maya-role">Nutrition Coach</div></div>
        </div>
        <div class="h-logo">habitude</div>
      </div>
      <div class="messages" id="messages">${msgsHtml}${loadingHtml}<div id="msgs-end"></div></div>
      <div class="input-area">
        ${previewHtml}
        <div class="input-row">
          <button class="photo-btn" id="photo-btn">📷</button>
          <textarea class="chat-ta" id="chat-ta" placeholder="Message Maya..." rows="1">${S.input}</textarea>
          <button class="send-btn ${canSend?'on':'off'}" id="send-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
          </button>
        </div>
        <div class="input-foot">habitude &middot; coaching by Joel</div>
      </div>`;

    document.getElementById("msgs-end")?.scrollIntoView();
    document.getElementById("photo-btn").onclick = () => fileInput.click();
    document.getElementById("clear-img")?.addEventListener("click", () => { S.pendingImage = null; render(); });
    document.getElementById("send-btn").onclick = doSend;
    const ta = document.getElementById("chat-ta");
    ta.oninput = e => { S.input = e.target.value; document.getElementById("send-btn").className = `send-btn ${!S.loading && (S.input.trim() || S.pendingImage) ? 'on' : 'off'}`; };
    ta.onkeydown = e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); doSend(); } };
  }
}

render();
</script>
</body>
</html>
