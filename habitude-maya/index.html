<script>

function mdToHtml(t) {
  if (!t) return "";
  let h = t;
  h = h.replace(/(\|[^\n]+\|\n?)+/g, tbl => {
    const rows = tbl.trim().split("\n");
    if (rows.length < 2) return tbl;
    const hdr = rows[0].split("|").filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join("");
    const bdy = rows.slice(2).map(r => { const cells = r.split("|").filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join(""); return `<tr>${cells}</tr>`; }).join("");
    return `<div class="tw"><table><thead><tr>${hdr}</tr></thead><tbody>${bdy}</tbody></table></div>`;
  });
  h = h.replace(/^### (.+)$/gm,"<h4>$1</h4>").replace(/^## (.+)$/gm,"<h3>$1</h3>").replace(/^# (.+)$/gm,"<h2>$1</h2>");
  h = h.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\*(.+?)\*/g,"<em>$1</em>");
  h = h.replace(/^[\-\*] (.+)$/gm,"<li>$1</li>").replace(/^(\d+)\. (.+)$/gm,"<li>$2</li>");
  h = h.replace(/(<li>.*?<\/li>\n?)+/g, m=>`<ul>${m}</ul>`);
  h = h.replace(/\n\n/g,"</p><p>").replace(/\n/g,"<br/>");
  h = "<p>" + h + "</p>";
  ["h2","h3","h4","ul","div"].forEach(tag => {
    h = h.replace(new RegExp(`<p>(<${tag}[ >])`,"g"),"$1");
    h = h.replace(new RegExp(`(</${tag}>)<\\/p>`,"g"),"$1");
  });
  return h.replace(/<p><\/p>/g,"");
}

const S = {
  screen: "loading",
  user: null,
  profile: null,
  messages: [],
  input: "",
  loading: false,
  pendingImage: null,
  obStep: 0,
  obForm: { name:"", age:"", sex:"", weight:"", weightUnit:"kg", height:"", goal:"", activityLevel:"", trainingType:"", restrictions:"" },
  authMode: "login",
  authEmail: "", authPassword: "", authName: "", authError: "",
};

const app = document.getElementById("app");
const fileInput = document.getElementById("file-input");
fileInput.onchange = e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => { S.pendingImage = { data: reader.result.split(",")[1], preview: reader.result }; render(); };
  reader.readAsDataURL(file);
  e.target.value = "";
};

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    S.user = session.user;
    await loadProfile();
  } else {
    S.screen = "welcome";
  }
  render();
}

async function loadProfile() {
  const { data } = await sb.from('profiles').select('*').eq('user_id', S.user.id).single();
  if (data) {
    S.profile = data;
    await loadHistory();
    S.screen = "chat";
  } else {
    S.screen = "onboarding";
  }
}

async function loadHistory() {
  const { data } = await sb.from('messages').select('*').eq('user_id', S.user.id).order('created_at', { ascending: true }).limit(40);
  if (data) {
    S.messages = data.map(m => ({ role: m.role, content: m.content, _preview: m.image_preview || null }));
  }
}

async function saveMessage(role, content, imagePreview) {
  await sb.from('messages').insert({ user_id: S.user.id, role, content: typeof content === 'string' ? content : JSON.stringify(content), image_preview: imagePreview || null });
}

async function signUp() {
  S.authError = ""; render();
  const { data, error } = await sb.auth.signUp({ email: S.authEmail, password: S.authPassword, options: { data: { full_name: S.authName } } });
  if (error) { S.authError = error.message; render(); return; }
  S.user = data.user;
  S.screen = "onboarding";
  render();
}

async function signIn() {
  S.authError = ""; render();
  const { data, error } = await sb.auth.signInWithPassword({ email: S.authEmail, password: S.authPassword });
  if (error) { S.authError = "Incorrect email or password."; render(); return; }
  S.user = data.user;
  await loadProfile();
  render();
}

async function signOut() {
  await sb.auth.signOut();
  S.user = null; S.profile = null; S.messages = [];
  S.screen = "welcome";
  render();
}

async function saveProfile() {
  const f = S.obForm;
  const { data, error } = await sb.from('profiles').insert({
    user_id: S.user.id, name: f.name, age: parseInt(f.age), sex: f.sex,
    weight: parseFloat(f.weight), weight_unit: f.weightUnit, height: parseFloat(f.height),
    goal: f.goal, activity_level: f.activityLevel, training_type: f.trainingType, restrictions: f.restrictions
  }).select().single();
  if (!error) S.profile = data;
}

function buildSystemWithContext() {
  if (!S.profile) return MAYA_SYSTEM;
  const p = S.profile;
  const profileCtx = `\n\nCLIENT PROFILE:\nName: ${p.name} | Age: ${p.age} | Sex: ${p.sex} | Weight: ${p.weight}${p.weight_unit} | Height: ${p.height}cm | Goal: ${p.goal} | Activity: ${p.activity_level} | Training: ${p.training_type} | Restrictions: ${p.restrictions || 'none'}`;
  return MAYA_SYSTEM + profileCtx;
}

async function callMaya(userMsg) {
  S.loading = true; render();
  const history = S.messages.slice(-20).map(({ role, content }) => ({ role, content }));
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ system: buildSystemWithContext(), messages: [...history, { role: userMsg.role, content: userMsg.content }] }),
    });
    const data = await res.json();
    const reply = data.content?.find(b => b.type === "text")?.text || "Sorry, something went wrong — please try again.";
    S.messages = [...S.messages, userMsg, { role: "assistant", content: reply }];
    await saveMessage("assistant", reply);
  } catch (e) {
    console.error(e);
    S.messages = [...S.messages, userMsg, { role: "assistant", content: "Sorry, something went wrong — please try again." }];
  }
  S.loading = false; render();
  setTimeout(() => document.getElementById("msgs-end")?.scrollIntoView({ behavior: "smooth" }), 50);
}

async function doSend() {
  if (S.loading || (!S.input.trim() && !S.pendingImage)) return;
  let userMsg;
  if (S.pendingImage) {
    userMsg = { role: "user", content: [{ type: "image", source: { type: "base64", media_type: "image/jpeg", data: S.pendingImage.data } }, { type: "text", text: S.input || "Here's what I had." }], _preview: S.pendingImage.preview };
    await saveMessage("user", S.input || "Here's what I had.", S.pendingImage.preview);
  } else {
    userMsg = { role: "user", content: S.input };
    await saveMessage("user", S.input);
  }
  S.input = ""; S.pendingImage = null;
  callMaya(userMsg);
}

async function handleOnboarding() {
  await saveProfile();
  const f = S.obForm;
  const introMsg = { role: "user", content: `Hi Maya! Here is my profile:\nName: ${f.name}\nAge: ${f.age}\nSex: ${f.sex}\nCurrent weight: ${f.weight} ${f.weightUnit}\nHeight: ${f.height ? f.height + " cm" : "not provided"}\nMain goal: ${f.goal}\nActivity level: ${f.activityLevel}\nTraining type: ${f.trainingType}\nDietary restrictions/preferences: ${f.restrictions || "None"}\n\nPlease create my personalised nutritional programme!` };
  await saveMessage("user", introMsg.content);
  S.screen = "chat";
  callMaya(introMsg);
}

function isObValid() {
  const f = S.obForm;
  return [!!(f.name?.trim() && f.age && f.sex), !!(f.weight && f.goal), !!(f.activityLevel && f.trainingType?.trim())][S.obStep];
}

function collectOb() {

  if (step === 0) { S.obForm.name = document.getElementById("f-name")?.value||""; S.obForm.age = document.getElementById("f-age")?.value||""; S.obForm.sex = document.getElementById("f-sex")?.value||""; }

}

  if (S.screen === "welcome") {
    app.innerHTML = `

          <div>
            <div class="logo fu">habitude</div>
            <div class="logo-tag fu2">nutrition coaching</div>
          </div>
          <div class="card fu3">
            <h2>Meet Maya</h2>
            <p>Your personal nutrition coach. She'll create your programme, analyse your food photos, and remember your journey — day after day.</p>
          </div>
          <div style="width:100%;max-width:400px;display:flex;flex-direction:column;gap:.75rem" class="fu4">
            <button class="btn-gold" id="btn-signup">Create your account</button>
            <button class="btn-ghost" id="btn-login">Already have an account? Sign in</button>
          </div>
          <div class="footer-note fu5">A habitude product &middot; coaching by Joel</div>
        </div>
      </div>`;
    document.getElementById("btn-signup").onclick = () => { S.authMode = "signup"; S.screen = "auth"; render(); };
    document.getElementById("btn-login").onclick = () => { S.authMode = "login"; S.screen = "auth"; render(); };
    return;
  }

  if (S.screen === "auth") {
    const isSignup = S.authMode === "signup";
    app.innerHTML = `
      <div class="screen">
        <div class="auth-inner">
          <div class="auth-logo fu">
            <div class="logo" style="font-size:1.8rem">habitude</div>
            <div class="logo-tag">${isSignup ? "create your account" : "welcome back"}</div>
          </div>
          <div class="fu2" style="display:flex;flex-direction:column;gap:.2rem">
            ${isSignup ? `<div class="field"><label>Your name</label><input id="a-name" placeholder="e.g. Sarah" value="${S.authName}"></div>` : ""}
            <div class="field"><label>Email</label><input id="a-email" type="email" placeholder="your@email.com" value="${S.authEmail}"></div>
            <div class="field"><label>Password</label><input id="a-pass" type="password" placeholder="${isSignup ? "choose a password" : "your password"}" value="${S.authPassword}"></div>
            <div class="err" id="auth-err">${S.authError}</div>
            <button class="btn-gold" id="auth-submit">${isSignup ? "Create account" : "Sign in"}</button>
            <button class="btn-ghost" id="auth-toggle" style="margin-top:.3rem">${isSignup ? "Already have an account? Sign in" : "No account yet? Create one"}</button>
            <button class="btn-ghost" id="auth-back">← Back</button>
          </div>
        </div>
      </div>`;
    const syncFields = () => {
      if (isSignup) S.authName = document.getElementById("a-name")?.value || "";
      S.authEmail = document.getElementById("a-email")?.value || "";
      S.authPassword = document.getElementById("a-pass")?.value || "";
    };
    document.querySelectorAll('#a-name, #a-email, #a-pass').forEach(el => el?.addEventListener('input', syncFields));
    document.getElementById("auth-submit").onclick = async () => { syncFields(); isSignup ? await signUp() : await signIn(); };
    document.getElementById("auth-toggle").onclick = () => { S.authMode = isSignup ? "login" : "signup"; S.authError = ""; render(); };
    document.getElementById("auth-back").onclick = () => { S.screen = "welcome"; S.authError = ""; render(); };
    document.querySelectorAll('#a-email, #a-pass').forEach(el => el?.addEventListener('keydown', e => { if (e.key === "Enter") document.getElementById("auth-submit").click(); }));
    return;
  }

  if (S.screen === "onboarding") {
    const f = S.obForm; const step = S.obStep; const valid = isObValid();
    let fields = "";
    if (step === 0) {
      fields = `
        <div class="ob-title">Let's get to know you</div>
        <div class="ob-sub">Maya will use this to build your personalised programme.</div>
        <div class="field"><label>Your name</label><input id="f-name" placeholder="e.g. Sarah" value="${f.name}"></div>
        <div class="field"><label>Age</label><input id="f-age" type="number" placeholder="e.g. 32" value="${f.age}"></div>
        <div class="field"><label>Sex (for calorie calculations)</label>
          <select id="f-sex"><option value="">Select...</option><option value="female" ${f.sex==="female"?"selected":""}>Female</option><option value="male" ${f.sex==="male"?"selected":""}>Male</option></select></div>`;
    } else if (step === 1) {
      fields = `
        <div class="ob-title">Your body &amp; goals</div>
        <div class="ob-sub">Honest numbers help Maya give you accurate targets.</div>
        <div class="field"><label>Current weight</label>
          <div class="weight-row">
            <div class="field"><input id="f-weight" type="number" placeholder="e.g. 65" value="${f.weight}"></div>
            <button class="unit-btn ${f.weightUnit==='kg'?'active':''}" id="btn-kg">kg</button>
            <button class="unit-btn ${f.weightUnit==='lbs'?'active':''}" id="btn-lbs">lbs</button>
          </div></div>
        <div class="field"><label>Height (cm)</label><input id="f-height" type="number" placeholder="e.g. 165" value="${f.height}"></div>
        <div class="field"><label>Main goal</label>
          <select id="f-goal"><option value="">Select...</option>${GOALS.map(g=>`<option value="${g.v}" ${f.goal===g.v?"selected":""}>${g.l}</option>`).join("")}</select></div>`;
    } else {
      fields = `
        <div class="ob-title">Lifestyle &amp; training</div>
        <div class="ob-sub">Almost there — helps Maya calculate your calorie needs accurately.</div>
        <div class="field"><label>Activity level</label>
          <select id="f-activity"><option value="">Select...</option>${ACTIVITY.map(a=>`<option value="${a.v}" ${f.activityLevel===a.v?"selected":""}>${a.l}</option>`).join("")}</select></div>
        <div class="field"><label>Type of training</label><input id="f-training" placeholder="e.g. powerlifting, yoga, running..." value="${f.trainingType}"></div>
        <div class="field"><label>Dietary restrictions / preferences (optional)</label><input id="f-rest" placeholder="e.g. vegetarian, no dairy, love pasta..." value="${f.restrictions}"></div>`;
    }
    app.innerHTML = `
      <div class="screen">
        <div class="ob-inner">
          <div style="text-align:center;margin-bottom:1.5rem;font-family:'Cormorant Garamond',serif;font-size:1.5rem;letter-spacing:.08em">habitude</div>
          <div class="ob-progress"><div class="ob-bar" style="width:${((step+1)/3)*100}%"></div></div>
          ${fields}
          <button class="ob-next ${valid?'on':'off'}" id="ob-next">${step < 2 ? "Continue →" : "Meet Maya →"}</button>
          ${step > 0 ? `<button class="btn-ghost" id="ob-back" style="width:100%;text-align:center;margin-top:.3rem">← Back</button>` : ""}
        </div>
      </div>`;
    document.querySelectorAll('.field input, .field select').forEach(el => {
      el.addEventListener('input', () => { collectOb(); document.getElementById('ob-next').className = 'ob-next ' + (isObValid() ? 'on' : 'off'); });
      el.addEventListener('change', () => { collectOb(); document.getElementById('ob-next').className = 'ob-next ' + (isObValid() ? 'on' : 'off'); });
    });
    document.getElementById("ob-next").onclick = () => { collectOb(); if (!isObValid()) return; if (S.obStep < 2) { S.obStep++; render(); } else { handleOnboarding(); } };
    document.getElementById("ob-back")?.addEventListener("click", () => { S.obStep--; render(); });
    document.getElementById("btn-kg")?.addEventListener("click", () => { S.obForm.weightUnit = "kg"; render(); });
    document.getElementById("btn-lbs")?.addEventListener("click", () => { S.obForm.weightUnit = "lbs"; render(); });
    return;
  }

  // CHAT
  const canSend = !S.loading && (S.input.trim() || S.pendingImage);
  const msgsHtml = S.messages.map(m => {
    const isMaya = m.role === "assistant";
    const text = typeof m.content === "string" ? m.content : (m.content.find?.(b => b.type === "text")?.text || "");
    const preview = m._preview || null;
    if (isMaya) return `<div class="msg-maya"><div class="avatar sm">M</div><div class="bubble-maya">${mdToHtml(text)}</div></div>`;
    return `<div class="msg-user"><div>${preview ? `<img class="msg-img" src="${preview}">` : ""}${text ? `<div class="bubble-user">${text}</div>` : ""}</div></div>`;
  }).join("");
  const loadingHtml = S.loading ? `<div class="msg-maya"><div class="avatar sm">M</div><div class="bubble-maya"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>` : "";
  const previewHtml = S.pendingImage ? `<div class="preview-bar"><img src="${S.pendingImage.preview}"><span>Photo ready to send</span><button id="clear-img">&times;</button></div>` : "";

  app.innerHTML = `
    <div class="chat-header">
      <div class="maya-info"><div class="avatar">M</div><div><div class="maya-name">Maya</div><div class="maya-role">Nutrition Coach</div></div></div>
      <div style="display:flex;align-items:center;gap:1rem">
        <div class="h-logo">habitude</div>
        <button class="sign-out" id="sign-out">Sign out</button>
      </div>
    </div>
    <div class="messages" id="messages">${msgsHtml}${loadingHtml}<div id="msgs-end"></div></div>
    <div class="input-area">
      ${previewHtml}
      <div class="input-row">
        <button class="photo-btn" id="photo-btn">📷</button>
        <textarea class="chat-ta" id="chat-ta" placeholder="Message Maya..." rows="1">${S.input}</textarea>
        <button class="send-btn ${canSend?'on':'off'}" id="send-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
        </button>
      </div>
      <div class="input-foot">habitude &middot; coaching by Joel</div>
    </div>`;

  setTimeout(() => document.getElementById("msgs-end")?.scrollIntoView(), 50);
  document.getElementById("sign-out").onclick = signOut;
  document.getElementById("photo-btn").onclick = () => fileInput.click();
  document.getElementById("clear-img")?.addEventListener("click", () => { S.pendingImage = null; render(); });
  document.getElementById("send-btn").onclick = doSend;
  const ta = document.getElementById("chat-ta");
  ta.oninput = e => { S.input = e.target.value; document.getElementById("send-btn").className = `send-btn ${!S.loading && (S.input.trim() || S.pendingImage) ? 'on' : 'off'}`; };
  ta.onkeydown = e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); doSend(); } };
}

init();
</script>
</body>
</html>
